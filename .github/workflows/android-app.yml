name: Build Android Apps

on:
  push:
    paths:
      - "app/**"
      - "debug-console/**"
      - "build.gradle"
      - "settings.gradle"
      - ".github/workflows/android-app.yml"
  pull_request:
    paths:
      - "app/**"
      - "debug-console/**"
      - "build.gradle"
      - "settings.gradle"
      - ".github/workflows/android-app.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Prepare Android SDK path
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Build debug APKs
        run: gradle :app:assembleDebug :debug-console:assembleDebug --no-daemon

      - name: Upload sync APK
        uses: actions/upload-artifact@v4
        with:
          name: ov-watch-sync-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug console APK
        uses: actions/upload-artifact@v4
        with:
          name: witchapp-debug-console-apk
          path: debug-console/build/outputs/apk/debug/*.apk
